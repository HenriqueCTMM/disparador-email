<mat-toolbar color="primary" class="shadow-sm toolbar">
  <div class="toolbar__title">
    <mat-icon aria-hidden="true">mail</mat-icon>
    <span class="ml-2 font-semibold">{{ pageTitle() }}</span>
  </div>

  <mat-slide-toggle
    [checked]="mockModeEnabled()"
    (change)="onMockModeToggle($event)"
    aria-label="Alternar entre API real e API mockada"
  >
    API mock
  </mat-slide-toggle>
</mat-toolbar>

@if (isLoading()) {
  <mat-progress-bar mode="indeterminate" aria-label="Carregando dados"></mat-progress-bar>
}

<mat-sidenav-container class="app-shell">
  <mat-sidenav mode="side" opened class="!w-72 border-r border-slate-200 bg-slate-50">
    <nav aria-label="Navegação principal" class="p-4">
      <mat-nav-list>
        @for (item of navItems; track item.path) {
          <a
            mat-list-item
            [routerLink]="item.path"
            routerLinkActive="active-link"
            [routerLinkActiveOptions]="{ exact: item.path === '' }"
          >
            <mat-icon matListItemIcon aria-hidden="true">{{ item.icon }}</mat-icon>
            <span matListItemTitle>{{ item.label }}</span>
          </a>
        }
      </mat-nav-list>
    </nav>
  </mat-sidenav>

  <mat-sidenav-content>
    <main class="mx-auto max-w-7xl p-6">
      <router-outlet></router-outlet>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
